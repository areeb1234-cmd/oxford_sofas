<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Oxford Sofas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cart.css">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body class="pt-5 mt-4">
  <div id="navbar-container"></div>

  <!-- Floating Background Shapes -->
  <div class="floating-shape shape-1"></div>
  <div class="floating-shape shape-2"></div>
  <div class="floating-shape shape-3"></div>

  <div class="cart-header py-5 mb-4 border-bottom position-relative">
    <div class="container text-center reveal">
      <h1 class="display-4 font-playfair fw-bold mb-3">Your Cart</h1>
      <p class="lead" style="color: var(--text-color); opacity: 0.8;">Review your selected items before checkout.</p>
    </div>
  </div>

  <div class="container mb-5 reveal">
    <div class="row g-5" id="cart-content-row">
      <!-- Left Side: Cart Items -->
      <div class="col-lg-8" id="cart-items-container">
        
        <!-- Free Shipping Progress Bar -->
        <div class="glass-card p-4 mb-4 rounded-4 d-none" id="shipping-progress-container">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="fw-bold" id="shipping-message">Add $50 more for FREE shipping</span>
            <i class="fas fa-truck text-muted"></i>
          </div>
          <div class="progress" style="height: 10px; background-color: rgba(128,128,128,0.2);">
            <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" id="shipping-progress-bar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
          </div>
        </div>

        <div id="cart-items">
          <!-- Injected by JS -->
        </div>
      </div>

      <!-- Right Side: Order Summary -->
      <div class="col-lg-4" id="order-summary-container">
        <div class="glass-card p-4 rounded-4 sticky-top" style="top: 100px;">
          <h4 class="font-playfair mb-4 fw-bold">Order Summary</h4>
          
          <div class="summary-row d-flex justify-content-between mb-3">
            <span style="opacity: 0.8;">Subtotal</span>
            <span class="fw-bold price-update-anim">$<span id="cart-total">0.00</span></span>
          </div>
          <div class="summary-row d-flex justify-content-between mb-3">
            <span style="opacity: 0.8;">Shipping</span>
            <span class="fw-bold" id="shipping-cost">Calculated at checkout</span>
          </div>
          <div class="summary-row d-flex justify-content-between mb-3">
            <span style="opacity: 0.8;">Taxes</span>
            <span class="fw-bold">Calculated at checkout</span>
          </div>
          
          <div class="input-group mb-4 mt-3 promo-group">
            <input type="text" class="form-control glass-input" placeholder="Promo Code" id="promoCodeInput">
            <button class="btn btn-outline-dark-custom" type="button" id="applyPromoBtn">Apply</button>
          </div>
          <div id="promoMessage" class="small mb-3"></div>
          
          <div class="summary-row d-flex justify-content-between mb-3 text-success d-none" id="discountRow">
            <span>Discount</span>
            <span class="fw-bold price-update-anim">-$<span id="discountAmount">0.00</span></span>
          </div>
          
          <hr class="my-4" style="border-color: var(--text-color); opacity: 0.1;">
          
          <div class="d-flex justify-content-between mb-4 align-items-center">
            <span class="fw-bold fs-5">Estimated Total</span>
            <span class="fw-bold fs-4 price-update-anim" style="color: var(--accent-color);">$<span id="cart-total-final">0.00</span></span>
          </div>

          <div class="estimated-delivery mb-4 p-3 rounded-3" style="background: rgba(128,128,128,0.05); border: 1px solid rgba(128,128,128,0.1);">
            <div class="d-flex align-items-center">
              <i class="fas fa-calendar-alt me-3 fs-4" style="color: var(--accent-color);"></i>
              <div>
                <p class="mb-0 fw-bold" style="font-size: 0.9rem;">Estimated Delivery</p>
                <p class="mb-0 text-muted" style="font-size: 0.8rem;" id="delivery-date">Arrives by ...</p>
              </div>
            </div>
          </div>

          <a href="checkout.html" class="btn btn-gold w-100 py-3 rounded-pill btn-glow fw-bold fs-6 d-flex justify-content-center align-items-center gap-2">
            Proceed to Checkout <i class="fas fa-lock small"></i>
          </a>
          
          <div class="text-center mt-4">
            <a href="shop.html" class="continue-shopping-link text-decoration-none small fw-bold">
              <i class="fas fa-arrow-left me-2"></i>Continue Shopping
            </a>
          </div>

          <!-- 3D Character Container (Summary) -->
          <div id="character-container" class="mt-4 d-flex justify-content-center" style="height: 150px;">
            <lottie-player id="cart-character" src="https://lottie.host/81a95a89-223f-42b7-8898-8422119c629f/1oB4P0P52T.json" background="transparent" speed="1" style="width: 150px; height: 150px;" loop autoplay></lottie-player>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Scroll Reveal
      function reveal() {
        var reveals = document.querySelectorAll(".reveal");
        for (var i = 0; i < reveals.length; i++) {
          var windowHeight = window.innerHeight;
          var elementTop = reveals[i].getBoundingClientRect().top;
          var elementVisible = 150;
          if (elementTop < windowHeight - elementVisible) {
            reveals[i].classList.add("active");
          }
        }
      }
      window.addEventListener("scroll", reveal);
      setTimeout(reveal, 100);
    });
  </script>
</body>
</html>
