<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Signup | Oxford Sofas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="pt-5 mt-4">
  <div id="navbar-container"></div>

  <div class="auth-page">
    <div class="mouse-glow" id="mouseGlow"></div>
    <!-- Floating Background Shapes -->
    <div class="auth-shape auth-shape-1"></div>
    <div class="auth-shape auth-shape-2"></div>
    <div class="auth-shape auth-shape-3"></div>
    <div class="auth-shape auth-shape-4"></div>

    <div class="auth-container reveal">
      <!-- Form Container -->
      <div class="auth-form-wrapper">
        <div class="auth-glass-card" id="authCard">
          
          <!-- Success Overlay -->
          <div class="auth-success-overlay" id="successOverlay">
            <i class="fas fa-check-circle success-icon"></i>
            <h3 class="font-playfair fw-bold success-text" id="successMessage">Welcome Back 🎉</h3>
          </div>

          <!-- Sliding Form Container -->
          <div class="auth-form-container" id="formContainer">
            
            <!-- Login Form -->
            <div class="auth-form login-form" id="loginForm">
              <div class="text-center mb-4">
                <h2 class="font-playfair fw-bold mb-2">Welcome Back</h2>
                <p class="text-muted small">Sign in to your Oxford Sofas account</p>
              </div>
              
              <form onsubmit="handleAuthSubmit(event, 'login')">
                <div class="auth-input-group">
                  <input type="email" class="auth-input" id="loginEmail" placeholder="Email address" required>
                </div>
                
                <div class="auth-input-group">
                  <input type="password" class="auth-input" id="loginPassword" placeholder="Password" required>
                  <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                  <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
                  </div>
                  <a href="#" class="small text-decoration-none fw-bold" style="color: var(--accent-color);">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-gold auth-btn btn-glow mb-4" id="loginBtn">
                  <span class="btn-text">Sign In</span>
                  <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>
                
                <div class="position-relative mb-4 text-center">
                  <hr class="text-muted opacity-25">
                  <span class="position-absolute top-50 start-50 translate-middle px-3 small text-muted" style="background: var(--card-bg);">OR</span>
                </div>
                
                <div class="d-flex gap-3 mb-4">
                  <button type="button" class="btn social-btn flex-grow-1 d-flex align-items-center justify-content-center gap-2">
                    <i class="fab fa-google text-danger"></i> <span class="small fw-bold">Google</span>
                  </button>
                  <button type="button" class="btn social-btn flex-grow-1 d-flex align-items-center justify-content-center gap-2">
                    <i class="fab fa-facebook text-primary"></i> <span class="small fw-bold">Facebook</span>
                  </button>
                </div>
                
                <div class="text-center mt-4">
                  <p class="text-muted mb-0 small">Don't have an account? <a href="#" class="fw-bold text-decoration-none border-bottom pb-1" style="color: var(--text-color); border-color: var(--text-color) !important;" onclick="toggleAuthMode(event)">Sign Up</a></p>
                </div>
              </form>
            </div>

            <!-- Signup Form -->
            <div class="auth-form signup-form" id="signupForm">
              <div class="text-center mb-4">
                <h2 class="font-playfair fw-bold mb-2">Create Account</h2>
                <p class="text-muted small">Join Oxford Sofas for exclusive benefits</p>
              </div>
              
              <form onsubmit="handleAuthSubmit(event, 'signup')">
                <div class="auth-input-group">
                  <input type="text" class="auth-input" id="signupName" placeholder="Full Name" required>
                </div>

                <div class="auth-input-group">
                  <input type="email" class="auth-input" id="signupEmail" placeholder="Email address" required>
                </div>
                
                <div class="auth-input-group">
                  <input type="password" class="auth-input" id="signupPassword" placeholder="Password" required>
                  <i class="fas fa-eye password-toggle" onclick="togglePassword('signupPassword', this)"></i>
                </div>

                <div class="auth-input-group mb-4">
                  <input type="password" class="auth-input" id="signupConfirmPassword" placeholder="Confirm Password" required>
                  <i class="fas fa-eye password-toggle" onclick="togglePassword('signupConfirmPassword', this)"></i>
                </div>
                
                <button type="submit" class="btn btn-gold auth-btn btn-glow mb-4" id="signupBtn">
                  <span class="btn-text">Sign Up</span>
                  <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>
                
                <div class="text-center mt-4">
                  <p class="text-muted mb-0 small">Already have an account? <a href="#" class="fw-bold text-decoration-none border-bottom pb-1" style="color: var(--text-color); border-color: var(--text-color) !important;" onclick="toggleAuthMode(event)">Sign In</a></p>
                </div>
              </form>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Scroll Reveal
      function reveal() {
        var reveals = document.querySelectorAll(".reveal");
        for (var i = 0; i < reveals.length; i++) {
          var windowHeight = window.innerHeight;
          var elementTop = reveals[i].getBoundingClientRect().top;
          var elementVisible = 150;
          if (elementTop < windowHeight - elementVisible) {
            reveals[i].classList.add("active");
          }
        }
      }
      window.addEventListener("scroll", reveal);
      setTimeout(reveal, 100);

      // Advanced Mouse Interactions
      const mouseGlow = document.getElementById('mouseGlow');
      const authCard = document.getElementById('authCard');

      // Subtle mouse-follow glow effect
      document.addEventListener('mousemove', (e) => {
        if (mouseGlow) {
          mouseGlow.style.opacity = '1';
          mouseGlow.style.left = e.clientX + 'px';
          mouseGlow.style.top = e.clientY + 'px';
        }
      });
      
      document.addEventListener('mouseleave', () => {
        if (mouseGlow) mouseGlow.style.opacity = '0';
      });

      // 3D Tilt Effect on Glass Card
      if (authCard) {
        authCard.addEventListener('mousemove', (e) => {
          const rect = authCard.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          
          // Max rotation of 5 degrees
          const rotateX = ((y - centerY) / centerY) * -5; 
          const rotateY = ((x - centerX) / centerX) * 5;
          
          authCard.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
        });
        
        authCard.addEventListener('mouseleave', () => {
          authCard.style.transform = `perspective(1000px) rotateX(0) rotateY(0) translateY(0)`;
        });
      }
    });
  </script>
</body>
</html>
